name: Build Windows Executable

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-2022

    steps:
      - name: Obter código
        uses: actions/checkout@v6

      - name: Instalar Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          architecture: 'x64'
          cache: 'pip'

      - name: Atualizar pip
        run: python -m pip install --upgrade pip

      - name: Instalar dependências
        run: |
          python -m pip install PySide6 pyinstaller

      - name: Listar ficheiros do repositório
        run: |
          dir

      - name: Validar sintaxe do main
        run: python -m py_compile main_controlo_presencas_am.py

      - name: Criar executável Windows
        run: |
          pyinstaller --noconfirm --clean --windowed --onefile --name "ControloPresencasAM" --collect-all PySide6 main_controlo_presencas_am.py

      - name: Verificar executável criado
        run: |
          dir dist

      - name: Criar pacote de distribuição
        run: |
          mkdir pacote_windows
          copy dist\ControloPresencasAM.exe pacote_windows\
          echo Plataforma de Controlo de Presencas da Assembleia Municipal > pacote_windows\LEIA-ME.txt
          echo. >> pacote_windows\LEIA-ME.txt
          echo Execute o ficheiro ControloPresencasAM.exe. >> pacote_windows\LEIA-ME.txt
          echo A base de dados SQLite sera criada automaticamente na mesma pasta do executavel. >> pacote_windows\LEIA-ME.txt
          echo A pasta documentos_presencas sera criada automaticamente quando forem anexados documentos. >> pacote_windows\LEIA-ME.txt

      - name: Publicar executável como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: ControloPresencasAM-Windows
          path: pacote_windows/
