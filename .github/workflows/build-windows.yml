name: Build Windows Executable

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-2022

    steps:
      - name: Obter código
        uses: actions/checkout@v5

      - name: Instalar Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          architecture: 'x64'
          cache: 'pip'

      - name: Atualizar pip
        run: python -m pip install --upgrade pip

      - name: Instalar dependências
        run: |
          python -m pip install PySide6 pyinstaller

      - name: Listar ficheiros do repositório
        run: |
          dir

      - name: Validar sintaxe do main
        run: python -m py_compile main_controlo_presencas_am.py

      - name: Criar executável Windows
        run: |
          pyinstaller --noconfirm --clean --windowed --onefile --name "ControloPresencasAM" --collect-all PySide6 main_controlo_presencas_am.py

      - name: Verificar executável criado
        run: |
          dir dist

      - name: Criar pacote de distribuição
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path pacote_windows
          Copy-Item -Path "dist\ControloPresencasAM.exe" -Destination "pacote_windows\ControloPresencasAM.exe"

          @"
Plataforma de Controlo de Presenças da Assembleia Municipal

Execute o ficheiro ControloPresencasAM.exe.

A base de dados SQLite será criada automaticamente na mesma pasta do executável.

A pasta documentos_presencas será criada automaticamente quando forem anexados documentos.
"@ | Out-File -FilePath "pacote_windows\LEIA-ME.txt" -Encoding utf8

      - name: Publicar executável como artefacto
        uses: actions/upload-artifact@v6
        with:
          name: ControloPresencasAM-Windows
          path: pacote_windows/
